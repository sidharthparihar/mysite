<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 2rem;
        }
        .slide-content p {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--neon-green);
            margin: 0;
        }
        h1 { margin-top: 0; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .section h2 { margin-top: 0; color: #0056b3; }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #0056b3;
            color: #fff;
            padding: 1rem 2rem;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #004494;
        }
        #message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 4px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        
        .work-slide {
            background: #f9f9f9;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Site Asset Manager</h1>
    <p>Update your portfolio content without touching any code. Save changes and reload your site to see updates.</p>

    <div id="form-container">Loading...</div>

    <button id="saveBtn" style="display:none;" onclick="saveConfig()">Save Changes</button>
    <div id="message"></div>
</div>

<script>
    let siteConfig = null;

    async function loadConfig() {
        const res = await fetch('/api/config');
        siteConfig = await res.json();
        renderForm();
    }

    function renderForm() {
        const container = document.getElementById('form-container');
        container.innerHTML = '';

        // Hero Section
        container.innerHTML += `
            <div class="section">
                <h2>Hero Section</h2>
                <div class="form-group">
                    <label>Line 1</label>
                    <input type="text" id="hero-line1" value="${siteConfig.hero.line1}">
                </div>
                <div class="form-group">
                    <label>Line 2 (Highlight)</label>
                    <input type="text" id="hero-line2" value="${siteConfig.hero.line2}">
                </div>
                <div class="form-group">
                    <label>Subtext</label>
                    <input type="text" id="hero-subtext" value="${siteConfig.hero.subtext}">
                </div>
            </div>
        `;

        // About Section
        container.innerHTML += `
            <div class="section">
                <h2>About Section</h2>
                <div class="form-group">
                    <label>About Text</label>
                    <textarea id="about-text" rows="4" style="width:100%;padding:0.8rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;font-family:inherit;font-size:1rem;resize:vertical;">${siteConfig.about}</textarea>
                </div>
            </div>
        `;

        // Manifesto
        container.innerHTML += `
            <div class="section">
                <h2>Statement / Manifesto Text</h2>
                <div class="form-group">
                    <label>Full Text</label>
                    <textarea id="man-text" rows="4" style="width:100%;padding:0.8rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;font-family:inherit;font-size:1rem;resize:vertical;">${siteConfig.manifesto.text}</textarea>
                </div>
            </div>
        `;

        // Parallax
        container.innerHTML += `
            <div class="section">
                <h2>Parallax Image Section</h2>
                <div class="form-group">
                    <label>Background Image URL</label>
                    <input type="text" id="parallax-image" value="${siteConfig.parallax.image}">
                </div>
                <div class="form-group">
                    <label>Overlay Title</label>
                    <input type="text" id="parallax-title" value="${siteConfig.parallax.title}">
                </div>
            </div>
        `;

        // Contact
        container.innerHTML += `
            <div class="section">
                <h2>Personal & Contact Information</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="contact-name" value="${siteConfig.contact.name}">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" id="contact-email" value="${siteConfig.contact.email}">
                </div>
                <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="text" id="contact-linkedin" value="${siteConfig.contact.linkedin}">
                </div>
                <div class="form-group">
                    <label>Instagram URL</label>
                    <input type="text" id="contact-instagram" value="${siteConfig.contact.instagram}">
                </div>
                <div class="form-group">
                    <label>GitHub URL</label>
                    <input type="text" id="contact-github" value="${siteConfig.contact.github}">
                </div>
                <div class="form-group">
                    <label>Steam URL</label>
                    <input type="text" id="contact-steam" value="${siteConfig.contact.steam}">
                </div>
                <div class="form-group">
                    <label>CV Download URL (PDF Link)</label>
                    <input type="text" id="contact-cv" value="${siteConfig.contact.cv_url}">
                </div>
            </div>
        `;

        // Work Slides
        let workHtml = '<div class="section"><h2>Work Projects (Center Scroll)</h2>';
        siteConfig.work.forEach((w, i) => {
            workHtml += `
                <div class="work-slide">
                    <div class="form-group">
                        <label>Project ${i+1} Title</label>
                        <input type="text" id="work-${i}-title" value="${w.title}">
                    </div>
                    <div class="form-group">
                        <label>Project ${i+1} Description</label>
                        <input type="text" id="work-${i}-desc" value="${w.desc || ''}">
                    </div>
                    <div class="form-group">
                        <label>Project ${i+1} Number</label>
                        <input type="text" id="work-${i}-number" value="${w.number}">
                    </div>
                    <div class="form-group">
                        <label>Project ${i+1} Image URL (or upload below)</label>
                        <input type="text" id="work-${i}-image" value="${w.image}">
                        <input type="file" accept="image/*" style="margin-top: 0.5rem;" onchange="uploadImage(this, 'work-${i}-image')">
                    </div>
                </div>
            `;
        });
        workHtml += '</div>';
        container.innerHTML += workHtml;

        // Gallery
        let galleryHtml = '<div class="section"><h2>Featured Gallery (Instagram Style)</h2>';
        siteConfig.gallery.forEach((g, i) => {
            galleryHtml += `
                <div class="work-slide">
                    <div class="form-group">
                        <label>Photo ${i+1} Image URL (or upload below)</label>
                        <input type="text" id="gallery-${i}-image" value="${g.image}">
                        <input type="file" accept="image/*" style="margin-top: 0.5rem;" onchange="uploadImage(this, 'gallery-${i}-image')">
                    </div>
                </div>
            `;
        });
        galleryHtml += '</div>';
        container.innerHTML += galleryHtml;

        // GitHub Projects
        let githubHtml = '<div class="section"><h2>Open Source // GitHub</h2>';
        siteConfig.github_projects.forEach((p, i) => {
            githubHtml += `
                <div class="work-slide">
                    <div class="form-group">
                        <label>Project ${i+1} Title</label>
                        <input type="text" id="github-${i}-title" value="${p.title}">
                    </div>
                    <div class="form-group">
                        <label>Project ${i+1} Description</label>
                        <input type="text" id="github-${i}-desc" value="${p.desc}">
                    </div>
                    <div class="form-group">
                        <label>Project ${i+1} URL</label>
                        <input type="text" id="github-${i}-url" value="${p.url}">
                    </div>
                </div>
            `;
        });
        githubHtml += '</div>';
        container.innerHTML += githubHtml;

        // Steam Games
        let steamHtml = '<div class="section"><h2>Currently Playing // Steam</h2>';
        siteConfig.steam_games.forEach((g, i) => {
            steamHtml += `
                <div class="work-slide">
                    <div class="form-group">
                        <label>Game ${i+1} Title</label>
                        <input type="text" id="steam-${i}-title" value="${g.title}">
                    </div>
                    <div class="form-group">
                        <label>Game ${i+1} Playtime/Hours</label>
                        <input type="text" id="steam-${i}-hours" value="${g.hours}">
                    </div>
                    <div class="form-group">
                        <label>Game ${i+1} Cover Image URL (or upload)</label>
                        <input type="text" id="steam-${i}-image" value="${g.image}">
                        <input type="file" accept="image/*" style="margin-top: 0.5rem;" onchange="uploadImage(this, 'steam-${i}-image')">
                    </div>
                </div>
            `;
        });
        steamHtml += '</div>';
        container.innerHTML += steamHtml;

        document.getElementById('saveBtn').style.display = 'block';
    }

    async function saveConfig() {
        const btn = document.getElementById('saveBtn');
        const msg = document.getElementById('message');
        btn.innerText = 'Saving...';
        btn.disabled = true;

        siteConfig.hero.line1 = document.getElementById('hero-line1').value;
        siteConfig.hero.line2 = document.getElementById('hero-line2').value;
        siteConfig.hero.subtext = document.getElementById('hero-subtext').value;

        siteConfig.about = document.getElementById('about-text').value;
        siteConfig.manifesto.text = document.getElementById('man-text').value;

        siteConfig.parallax.image = document.getElementById('parallax-image').value;
        siteConfig.parallax.title = document.getElementById('parallax-title').value;

        siteConfig.contact.name = document.getElementById('contact-name').value;
        siteConfig.contact.email = document.getElementById('contact-email').value;
        siteConfig.contact.linkedin = document.getElementById('contact-linkedin').value;
        siteConfig.contact.instagram = document.getElementById('contact-instagram').value;
        siteConfig.contact.github = document.getElementById('contact-github').value;
        siteConfig.contact.steam = document.getElementById('contact-steam').value;
        siteConfig.contact.cv_url = document.getElementById('contact-cv').value;

        siteConfig.gallery.forEach((g, i) => {
            g.image = document.getElementById(`gallery-${i}-image`).value;
        });

        siteConfig.github_projects.forEach((p, i) => {
            p.title = document.getElementById(`github-${i}-title`).value;
            p.desc = document.getElementById(`github-${i}-desc`).value;
            p.url = document.getElementById(`github-${i}-url`).value;
        });

        siteConfig.steam_games.forEach((g, i) => {
            g.title = document.getElementById(`steam-${i}-title`).value;
            g.hours = document.getElementById(`steam-${i}-hours`).value;
            g.image = document.getElementById(`steam-${i}-image`).value;
        });

        siteConfig.work.forEach((w, i) => {
            w.title = document.getElementById(`work-${i}-title`).value;
            w.desc = document.getElementById(`work-${i}-desc`).value;
            w.number = document.getElementById(`work-${i}-number`).value;
            w.image = document.getElementById(`work-${i}-image`).value;
        });

        try {
            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(siteConfig)
            });
            const data = await res.json();
            if(data.success) {
                msg.className = 'success';
                msg.innerText = 'Settings saved successfully! You can now visit your site to see the updates.';
                msg.style.display = 'block';
            }
        } catch (e) {
            msg.className = 'error';
            msg.innerText = 'Failed to save settings.';
            msg.style.display = 'block';
        }

        btn.innerText = 'Save Changes';
        btn.disabled = false;
        setTimeout(() => { msg.style.display = 'none'; }, 5000);
    }

    async function uploadImage(fileInput, targetId) {
        if (!fileInput.files || fileInput.files.length === 0) return;
        
        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('image', file);

        const targetInput = document.getElementById(targetId);
        const originalValue = targetInput.value;
        targetInput.value = 'Uploading...';

        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if(data.success) {
                targetInput.value = data.url;
            } else {
                targetInput.value = originalValue;
                alert('Upload failed: ' + data.error);
            }
        } catch (e) {
            targetInput.value = originalValue;
            alert('Upload failed.');
        }
    }

    // Initialize
    loadConfig();
</script>

</body>
</html>
